services:
  api:
    build: .
    environment:
      APP_ENV: local
      HTTP_ADDR: :8080
      PUBLIC_BASE_URL: http://localhost:8080
      DATABASE_URL: postgres://qr:qr@postgres:5432/qr?sslmode=disable
      REDIS_ADDR: redis:6379
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DATABASE: qr_analytics
      DEMO_API_KEY: qk_demo_local_dev_key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: qr
      POSTGRES_PASSWORD: qr
      POSTGRES_DB: qr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qr -d qr"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_DB: qr_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  clickhouse_data:
